<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電力監控儀表板 | Power Monitoring Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-primary: #060612;
            --bg-secondary: #0a0a1e;
            --bg-card: rgba(2, 10, 28, 0.92);
            --border: rgba(0, 200, 180, 0.18);
            --border-hover: rgba(0, 245, 212, 0.6);
            --text-primary: #b8d8f0;
            --text-secondary: #3a6080;
            --accent: #00f5d4;
            --accent2: #00aaff;
            --accent-green: #00ff88;
            --accent-red: #ff3355;
            --glow-sm: 0 0 6px rgba(0, 245, 212, 0.4);
            --glow-md: 0 0 14px rgba(0, 245, 212, 0.5), 0 0 28px rgba(0, 245, 212, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { height: 100%; width: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-primary);
            background-image:
                linear-gradient(rgba(0, 200, 180, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 200, 180, 0.035) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-primary);
        }

        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* ── HEADER ── */
        .header {
            background: rgba(4, 4, 16, 0.97);
            border-bottom: 1px solid var(--border);
            padding: 13px 24px;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(20px);
            position: relative; z-index: 100; flex-shrink: 0;
        }
        .header::after {
            content: '';
            position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 5%, var(--accent) 30%, var(--accent2) 50%, var(--accent) 70%, transparent 95%);
            opacity: 0.7;
        }
        .header-title {
            font-family: 'Orbitron', monospace, sans-serif;
            font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
            background-size: 200% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: titleShimmer 5s ease-in-out infinite;
            cursor: pointer; user-select: none;
        }
        @keyframes titleShimmer {
            0%, 100% { background-position: 0% center; }
            50%       { background-position: 100% center; }
        }
        .header-right {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; color: var(--text-secondary);
            font-family: 'Courier New', monospace; letter-spacing: 1px;
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green), 0 0 14px rgba(0, 255, 136, 0.5);
            animation: statusPulse 2.5s ease-in-out infinite; flex-shrink: 0;
        }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent-green), 0 0 14px rgba(0, 255, 136, 0.5); }
            50%       { opacity: 0.35; box-shadow: 0 0 2px var(--accent-green); }
        }

        /* ── CONTENT ── */
        .content {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .content::-webkit-scrollbar { width: 3px; }
        .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .loading {
            display: flex; align-items: center; justify-content: center; height: 100%;
            color: var(--text-secondary); font-family: 'Courier New', monospace;
            font-size: 12px; letter-spacing: 3px;
        }

        /* ── FACTORY TOTAL CARD ── */
        .factory-total {
            background: var(--bg-card);
            border: 1px solid rgba(0, 245, 212, 0.28);
            border-radius: 3px; padding: 24px 28px; margin-bottom: 22px;
            position: relative; overflow: hidden;
        }
        .factory-total::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scanLine 4s linear infinite;
        }
        @keyframes scanLine { 0% { left: -60%; } 100% { left: 140%; } }
        .factory-total::after {
            content: ''; position: absolute; bottom: 0; right: 0;
            width: 22px; height: 22px;
            border-right: 2px solid var(--accent); border-bottom: 2px solid var(--accent);
            opacity: 0.45;
        }
        .corner-tl {
            position: absolute; top: 0; left: 0; width: 22px; height: 22px;
            border-left: 2px solid var(--accent); border-top: 2px solid var(--accent);
            opacity: 0.45;
        }
        .section-label {
            font-size: 10px; letter-spacing: 4px; color: var(--text-secondary);
            text-transform: uppercase; margin-bottom: 6px;
        }
        .factory-total-value {
            font-family: 'Orbitron', monospace, sans-serif;
            font-size: 56px; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 8px rgba(0, 245, 212, 0.9), 0 0 24px rgba(0, 245, 212, 0.5), 0 0 60px rgba(0, 245, 212, 0.2);
            line-height: 1; letter-spacing: -2px; margin: 4px 0 2px;
        }
        .unit-label {
            font-size: 11px; color: var(--text-secondary);
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px;
        }
        .chart-container {
            position: relative; margin-top: 10px;
            background: rgba(0, 0, 0, 0.35); border-radius: 2px;
            border: 1px solid rgba(0, 200, 180, 0.07); padding: 10px;
        }

        /* ── GROUP CARDS ── */
        .groups-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .group-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 3px; padding: 18px 20px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative; overflow: hidden;
        }
        .group-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .group-card::after {
            content: ''; position: absolute; bottom: 0; right: 0;
            width: 16px; height: 16px;
            border-right: 1px solid var(--accent); border-bottom: 1px solid var(--accent);
            opacity: 0.3; transition: opacity 0.3s;
        }
        .group-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--glow-md), inset 0 0 40px rgba(0, 245, 212, 0.025);
            transform: translateY(-3px);
        }
        .group-card:hover::before { opacity: 1; }
        .group-card:hover::after  { opacity: 0.7; }
        .group-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: 1px; margin-bottom: 3px; }
        .device-count { font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; margin-bottom: 12px; }
        .group-card-value {
            font-family: 'Orbitron', monospace, sans-serif;
            font-size: 30px; font-weight: 700; color: var(--accent);
            text-shadow: 0 0 8px rgba(0, 245, 212, 0.7), 0 0 20px rgba(0, 245, 212, 0.25);
            line-height: 1;
        }
        .group-unit { font-size: 10px; color: var(--text-secondary); letter-spacing: 3px; margin-top: 3px; margin-bottom: 12px; }
        .small-chart-container { position: relative; background: rgba(0, 0, 0, 0.25); border-radius: 2px; }

        /* ── BACK BUTTON ── */
        .back-button {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; background: rgba(0, 245, 212, 0.05);
            border: 1px solid var(--border); border-radius: 3px; color: var(--accent);
            cursor: pointer; margin-bottom: 20px; font-size: 12px;
            letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }
        .back-button:hover { background: rgba(0, 245, 212, 0.1); border-color: var(--accent); box-shadow: var(--glow-sm); }

        /* ── DEVICE CARDS ── */
        .devices-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .device-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 3px; padding: 16px; position: relative; overflow: hidden;
        }
        .device-card::after {
            content: ''; position: absolute; bottom: 0; right: 0;
            width: 14px; height: 14px;
            border-right: 1px solid var(--accent); border-bottom: 1px solid var(--accent);
            opacity: 0.22;
        }
        .device-name { font-weight: 600; font-size: 14px; color: var(--text-primary); letter-spacing: 0.5px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 200, 180, 0.1); }
        .device-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .metric { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 200, 180, 0.1); padding: 10px 8px; border-radius: 2px; text-align: center; }
        .metric-label { font-size: 9px; letter-spacing: 2px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 6px; }
        .metric-value {
            font-family: 'Orbitron', monospace, sans-serif;
            font-size: 18px; font-weight: 700; color: var(--accent);
            text-shadow: 0 0 6px rgba(0, 245, 212, 0.55); line-height: 1;
        }
        .metric-unit { font-size: 9px; color: var(--text-secondary); letter-spacing: 2px; margin-top: 3px; text-transform: uppercase; }
        .device-chart { position: relative; height: 190px; margin-top: 12px; }

        /* ── FORECAST CARD ── */
        .forecast-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px 24px 16px;
            margin-bottom: 20px;
            position: relative;
        }
        .forecast-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent 5%, #ff9500 35%, #ff6b00 65%, transparent 95%);
            opacity: 0.7;
        }
        .forecast-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .forecast-title {
            font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase; color: #ff9500;
            text-shadow: 0 0 8px rgba(255, 149, 0, 0.5);
        }
        .forecast-meta {
            font-family: 'Courier New', monospace; font-size: 10px;
            color: var(--text-secondary); letter-spacing: 1px;
        }
        .forecast-alert {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 51, 85, 0.12);
            border: 1px solid rgba(255, 51, 85, 0.4);
            border-radius: 3px; padding: 10px 14px; margin-bottom: 14px;
            font-size: 13px; color: #ff6680; letter-spacing: 0.5px;
        }
        .forecast-alert-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ff3355;
            box-shadow: 0 0 6px #ff3355, 0 0 14px rgba(255,51,85,0.5);
            animation: statusPulse 1.5s ease-in-out infinite; flex-shrink: 0;
        }
        .forecast-legend {
            display: flex; align-items: center; gap: 20px;
            margin-top: 10px; font-size: 11px; color: var(--text-secondary);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-line { width: 28px; height: 2px; border-radius: 1px; }
        .legend-line.hist  { background: #00aaff; }
        .legend-line.pred  { background: #ff9500; border-top: 2px dashed #ff9500; height: 0; }
        .legend-line.thresh{ background: transparent; border-top: 2px dashed rgba(255,51,85,0.7); height: 0; }

        @media (max-width: 768px) {
            .groups-grid      { grid-template-columns: 1fr; }
            .devices-list     { grid-template-columns: 1fr; }
            .factory-total-value { font-size: 40px; }
            .content          { padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="app-container">
            <header class="header">
                <div class="header-title">⚡ 電力監控儀表板</div>
                <div class="header-right"><div class="status-dot"></div><span>載入中...</span></div>
            </header>
            <div class="content"><div class="loading">INITIALIZING SYSTEM...</div></div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const API_BASE = window.location.origin;
        const THRESHOLD_KW = 700; // 警戒閾值 kW
        const GROUP_ICONS = {
            "全廠": "🏭", "高壓盤": "⚡", "洗砂設備": "🌊",
            "集塵設備": "💨", "空壓設備": "🔵", "電爐設備": "🔥",
            "砂回收設備": "♻️", "辦公室用電": "🏢", "FMS設備": "🎯",
        };

        // ── Time helpers ──────────────────────────────────────────────

        function formatTimeHHMM(timestamp) {
            const [datePart, timePart] = timestamp.split('T');
            const [y, mo, d] = datePart.split('-').map(Number);
            const [h, mi] = timePart.split(':').map(Number);
            const utcMs = Date.UTC(y, mo - 1, d, h, mi, 0);
            const twDate = new Date(utcMs + 8 * 3600 * 1000);
            return `${String(twDate.getUTCHours()).padStart(2,'0')}:${String(twDate.getUTCMinutes()).padStart(2,'0')}`;
        }

        function getTodayTaiwanDate() {
            const d = new Date(Date.now() + 8 * 3600 * 1000);
            return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        }

        function getTimestampTaiwanDate(timestamp) {
            const [datePart, timePart] = timestamp.split('T');
            const [y, mo, d] = datePart.split('-').map(Number);
            const [h, mi] = timePart.split(':').map(Number);
            const utcMs = Date.UTC(y, mo - 1, d, h, mi, 0);
            const twDate = new Date(utcMs + 8 * 3600 * 1000);
            return `${twDate.getUTCFullYear()}-${String(twDate.getUTCMonth()+1).padStart(2,'0')}-${String(twDate.getUTCDate()).padStart(2,'0')}`;
        }

        function getTaiwanTimeString() {
            const now = new Date();
            let h = now.getUTCHours() + 8;
            if (h >= 24) h -= 24;
            return `${String(h).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')}:${String(now.getUTCSeconds()).padStart(2,'0')}`;
        }

        // "HH:MM" → minutes since midnight (x-axis value)
        function timeToMinutes(hhmm) {
            const [h, m] = hhmm.split(':').map(Number);
            return h * 60 + m;
        }

        // minutes → "HH:MM" (x-axis tick label)
        function minutesToHHMM(val) {
            const h = Math.floor(val / 60);
            const m = val % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }

        // Round down to nearest 5-minute boundary (minutes since midnight)
        function get5MinBucket(minutes) {
            return Math.floor(minutes / 5) * 5;
        }

        // Resample [{label:"HH:MM", value, timestamp?}] into 5-minute averages
        function resampleTo5Min(data) {
            if (!data || data.length === 0) return [];
            const buckets = new Map(); // bucket_minutes → { sum, count, timestamp }
            data.forEach(d => {
                const bucket = get5MinBucket(timeToMinutes(d.label));
                const prev   = buckets.get(bucket) || { sum: 0, count: 0, timestamp: d.timestamp || '' };
                buckets.set(bucket, { sum: prev.sum + d.value, count: prev.count + 1, timestamp: d.timestamp || prev.timestamp });
            });
            return Array.from(buckets.entries())
                .sort((a, b) => a[0] - b[0])
                .map(([bucket, { sum, count, timestamp }]) => ({
                    timestamp,
                    label: minutesToHHMM(bucket),
                    value: sum / count,
                }));
        }

        function calcCumulative(history) {
            if (!history || history.length < 2) return 0;
            let total = 0;
            for (let i = 1; i < history.length; i++) {
                const dt = (new Date(history[i].timestamp) - new Date(history[i-1].timestamp)) / 3600000;
                total += ((history[i].value + history[i-1].value) / 2) * dt;
            }
            return total;
        }

        function computeGroupTotals(latestMap, groups) {
            const totals = {};
            Object.entries(groups || {}).forEach(([group, devs]) => {
                if (group === "高壓盤") {
                    totals[group] = (latestMap["一號高壓盤總功率"]?.value || 0) + (latestMap["二號高壓盤總功率"]?.value || 0);
                } else {
                    totals[group] = devs.reduce((s, d) => s + (latestMap[d]?.value || 0), 0);
                }
            });
            return totals;
        }

        // ── Chart.js plugins ──────────────────────────────────────────

        // Neon glow on dataset lines
        const glowPlugin = {
            id: 'neonGlow',
            beforeDatasetsDraw(chart) {
                chart.ctx.save();
                chart.ctx.shadowBlur = 14;
                chart.ctx.shadowColor = 'rgba(0, 245, 212, 0.85)';
            },
            afterDatasetsDraw(chart) { chart.ctx.restore(); }
        };

        // Crosshair: drawn in afterDraw using chart._crosshair state
        const crosshairPlugin = {
            id: 'crosshair',
            afterDraw(chart) {
                if (!chart._crosshair) return;
                const { ctx, chartArea } = chart;
                const { x, y } = chart._crosshair;

                ctx.save();
                ctx.strokeStyle = 'rgba(0, 245, 212, 0.55)';
                ctx.lineWidth = 1;
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0, 245, 212, 0.7)';
                ctx.setLineDash([5, 4]);

                // Vertical line
                ctx.beginPath();
                ctx.moveTo(x, chartArea.top);
                ctx.lineTo(x, chartArea.bottom);
                ctx.stroke();

                // Horizontal line
                ctx.beginPath();
                ctx.moveTo(chartArea.left, y);
                ctx.lineTo(chartArea.right, y);
                ctx.stroke();

                // Snap dot
                ctx.setLineDash([]);
                ctx.shadowBlur = 16;
                ctx.shadowColor = '#00f5d4';
                ctx.fillStyle = '#00f5d4';
                ctx.beginPath();
                ctx.arc(x, y, 4.5, 0, 2 * Math.PI);
                ctx.fill();
                // Dot ring
                ctx.strokeStyle = 'rgba(0, 245, 212, 0.4)';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, 2 * Math.PI);
                ctx.stroke();

                ctx.restore();
            }
        };

        // Threshold line: red horizontal dashed line at threshold kW
        const thresholdPlugin = {
            id: 'thresholdLine',
            afterDraw(chart) {
                const thr = chart.config.options._threshold;
                if (!thr) return;
                const { ctx, chartArea, scales } = chart;
                const y = scales.y.getPixelForValue(thr);
                if (y < chartArea.top || y > chartArea.bottom) return;
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 51, 85, 0.75)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.moveTo(chartArea.left, y);
                ctx.lineTo(chartArea.right, y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(255, 51, 85, 0.85)';
                ctx.font = '10px Courier New';
                ctx.textAlign = 'right';
                ctx.fillText('警戒 ' + thr + ' kW', chartArea.right - 4, y - 4);
                ctx.restore();
            }
        };

        // ── ForecastChart component ───────────────────────────────────
        // historicalData: [{label:"HH:MM", value}]  (today's 5-min averages)
        // forecastData:   [{time:"HH:MM", minute, value, over_threshold}]
        // threshold: number (draws horizontal alert line)

        function ForecastChart({ historicalData, forecastData, threshold = 700, height = 280 }) {
            const canvasRef  = useRef(null);
            const chartRef   = useRef(null);
            const tooltipRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                if (chartRef.current) chartRef.current.destroy();

                const histPoints = (historicalData || []).map(d => ({
                    x: timeToMinutes(d.label), y: d.value
                }));
                const predPoints = (forecastData || []).map(d => ({
                    x: d.minute, y: d.value
                }));

                // Find connection point: last historical point → first forecast point
                const connectorPoints = [];
                if (histPoints.length > 0 && predPoints.length > 0) {
                    connectorPoints.push(histPoints[histPoints.length - 1]);
                    connectorPoints.push(predPoints[0]);
                }

                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    plugins: [glowPlugin, crosshairPlugin, thresholdPlugin],
                    data: {
                        datasets: [
                            {
                                label: '今日用電 (kW)',
                                data: histPoints,
                                borderColor: '#00aaff',
                                backgroundColor: 'rgba(0, 170, 255, 0.07)',
                                borderWidth: 2,
                                pointRadius: 0,
                                tension: 0.35,
                                fill: true,
                                order: 2,
                            },
                            {
                                label: '未來預測 (kW)',
                                data: predPoints,
                                borderColor: '#ff9500',
                                backgroundColor: 'rgba(255, 149, 0, 0.07)',
                                borderWidth: 2,
                                borderDash: [8, 4],
                                pointRadius: 0,
                                tension: 0.35,
                                fill: true,
                                order: 1,
                            },
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        _threshold: threshold,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false },
                        },
                        scales: {
                            x: {
                                type: 'linear', min: 0, max: 1439,
                                ticks: {
                                    stepSize: 120,
                                    color: '#3a6080', font: { size: 10, family: 'Courier New' },
                                    callback: v => minutesToHHMM(v),
                                    maxRotation: 0,
                                },
                                grid: { color: 'rgba(0, 200, 180, 0.06)' },
                                border: { color: 'rgba(0, 200, 180, 0.15)' },
                            },
                            y: {
                                ticks: { color: '#3a6080', font: { size: 10, family: 'Courier New' }, callback: v => v + ' kW' },
                                grid: { color: 'rgba(0, 200, 180, 0.06)' },
                                border: { color: 'rgba(0, 200, 180, 0.15)' },
                                beginAtZero: true,
                            }
                        }
                    }
                });

                // Mouse crosshair + tooltip
                const canvas = canvasRef.current;
                const onMouseMove = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const chart = chartRef.current;
                    if (!chart) return;
                    const mx = e.clientX - rect.left;
                    const { chartArea, scales } = chart;
                    if (mx < chartArea.left || mx > chartArea.right) {
                        chart._crosshair = null;
                        if (tooltipRef.current) tooltipRef.current.style.display = 'none';
                        chart.draw(); return;
                    }
                    const xVal = scales.x.getValueForPixel(mx);
                    // Find nearest point across both datasets
                    let nearest = null, minDist = Infinity;
                    chart.data.datasets.forEach(ds => {
                        (ds.data || []).forEach(pt => {
                            const d = Math.abs(pt.x - xVal);
                            if (d < minDist) { minDist = d; nearest = pt; }
                        });
                    });
                    if (!nearest) return;
                    const px = scales.x.getPixelForValue(nearest.x);
                    const py = scales.y.getPixelForValue(nearest.y);
                    chart._crosshair = { x: px, y: py };
                    chart.draw();
                    if (tooltipRef.current) {
                        const tip = tooltipRef.current;
                        const label = minutesToHHMM(nearest.x);
                        const isOver = nearest.y > threshold;
                        tip.style.display = 'block';
                        tip.innerHTML = `<span style="font-family:'Orbitron',monospace;font-size:14px;color:${isOver ? '#ff6680' : '#00f5d4'};font-weight:700;">${nearest.y.toFixed(1)}</span><span style="font-size:10px;color:#3a6080;"> kW</span><br><span style="font-size:10px;color:#3a6080;font-family:'Courier New',monospace;">${label}</span>`;
                        let tx = px + 12, ty = py - 40;
                        if (tx + 115 > chartArea.right + 20) tx = px - 129;
                        if (ty < chartArea.top) ty = py + 8;
                        tip.style.left = tx + 'px';
                        tip.style.top  = ty + 'px';
                    }
                };
                const onMouseLeave = () => {
                    if (chartRef.current) { chartRef.current._crosshair = null; chartRef.current.draw(); }
                    if (tooltipRef.current) tooltipRef.current.style.display = 'none';
                };
                canvas.addEventListener('mousemove', onMouseMove);
                canvas.addEventListener('mouseleave', onMouseLeave);
                return () => {
                    canvas.removeEventListener('mousemove', onMouseMove);
                    canvas.removeEventListener('mouseleave', onMouseLeave);
                    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
                };
            }, [historicalData, forecastData, threshold]);

            return (
                <div style={{ position: 'relative', height: `${height}px` }}>
                    <canvas ref={canvasRef} style={{ cursor: 'crosshair', display: 'block' }} />
                    <div ref={tooltipRef} style={{
                        display: 'none', position: 'absolute', pointerEvents: 'none',
                        background: 'rgba(2, 6, 18, 0.92)', border: '1px solid rgba(0, 200, 180, 0.35)',
                        borderRadius: '3px', padding: '8px 12px', minWidth: '110px',
                        backdropFilter: 'blur(8px)', lineHeight: '1.5',
                    }} />
                </div>
            );
        }

        // ── LineChart component ───────────────────────────────────────
        // data: [{ timestamp, label:"HH:MM", value }]
        // X-axis is always 00:00–23:59 (linear, 0–1439 minutes)

        function LineChart({ data, height = 280, maxTicks = 12 }) {
            const canvasRef  = useRef(null);
            const chartRef   = useRef(null);
            const tooltipRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;

                const ctx = canvasRef.current.getContext('2d');
                if (chartRef.current) chartRef.current.destroy();

                // Build {x, y} dataset (x = minutes since midnight)
                const chartPoints = (data && data.length > 0)
                    ? data.map(d => ({ x: timeToMinutes(d.label), y: d.value }))
                    : [];

                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    plugins: [glowPlugin, crosshairPlugin],
                    data: {
                        datasets: [{
                            label: '功率 (kW)',
                            data: chartPoints,
                            borderColor: '#00f5d4',
                            backgroundColor: 'rgba(0, 245, 212, 0.06)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.35,
                            fill: true,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false },  // custom HTML tooltip below
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: 1439,           // 23:59
                                grid: { color: 'rgba(0, 200, 180, 0.06)' },
                                ticks: {
                                    color: '#3a6080',
                                    font: { size: 10 },
                                    stepSize: 120,       // tick every 2 h
                                    maxTicksLimit: maxTicks,
                                    callback: (val) => minutesToHHMM(val),
                                }
                            },
                            y: {
                                display: true,
                                grid: { color: 'rgba(0, 200, 180, 0.06)' },
                                ticks: { color: '#3a6080', font: { size: 10 } }
                            }
                        }
                    }
                });

                // ── Crosshair + tooltip mouse events ──
                const canvas  = canvasRef.current;
                const tooltip = tooltipRef.current;

                const onMouseMove = (e) => {
                    const chart = chartRef.current;
                    if (!chart || !chart.chartArea) return;

                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const { chartArea, scales } = chart;

                    // Outside chart area → clear
                    if (mouseX < chartArea.left || mouseX > chartArea.right) {
                        chart._crosshair = null;
                        chart.draw();
                        if (tooltip) tooltip.style.display = 'none';
                        return;
                    }

                    const pts = chart.data.datasets[0].data;
                    if (!pts || pts.length === 0) return;

                    // Find nearest data point by x (time)
                    const xVal = scales.x.getValueForPixel(mouseX);
                    let nearestIdx = 0, minDist = Infinity;
                    pts.forEach((pt, i) => {
                        const d = Math.abs(pt.x - xVal);
                        if (d < minDist) { minDist = d; nearestIdx = i; }
                    });

                    const meta = chart.getDatasetMeta(0);
                    const ptMeta = meta.data[nearestIdx];
                    const ptData = pts[nearestIdx];
                    if (!ptMeta || !ptData) return;

                    // Update crosshair
                    chart._crosshair = { x: ptMeta.x, y: ptMeta.y };
                    chart.draw();

                    // Update HTML tooltip
                    if (tooltip) {
                        const timeStr = minutesToHHMM(ptData.x);
                        tooltip.innerHTML =
                            `<div style="font-family:Orbitron,monospace;font-size:14px;font-weight:700;color:#00f5d4;` +
                            `text-shadow:0 0 8px rgba(0,245,212,0.7);line-height:1">${ptData.y.toFixed(1)}` +
                            `<span style="font-size:9px;opacity:0.7;letter-spacing:1px;margin-left:3px">kW</span></div>` +
                            `<div style="font-family:'Courier New',monospace;font-size:11px;color:#3a6080;` +
                            `margin-top:5px;letter-spacing:2px">${timeStr}</div>`;

                        // Position: prefer right of crosshair, flip left if near edge
                        let tx = ptMeta.x + 14;
                        let ty = ptMeta.y - 56;
                        if (tx + 115 > chartArea.right + 20) tx = ptMeta.x - 129;
                        if (ty < chartArea.top) ty = ptMeta.y + 12;
                        tooltip.style.left = `${tx}px`;
                        tooltip.style.top  = `${ty}px`;
                        tooltip.style.display = 'block';
                    }
                };

                const onMouseLeave = () => {
                    const chart = chartRef.current;
                    if (chart) { chart._crosshair = null; chart.draw(); }
                    if (tooltip) tooltip.style.display = 'none';
                };

                canvas.addEventListener('mousemove', onMouseMove);
                canvas.addEventListener('mouseleave', onMouseLeave);

                return () => {
                    canvas.removeEventListener('mousemove', onMouseMove);
                    canvas.removeEventListener('mouseleave', onMouseLeave);
                    if (chartRef.current) chartRef.current.destroy();
                };
            }, [data]);

            return (
                <div style={{ position: 'relative', height: `${height}px` }}>
                    <canvas ref={canvasRef} style={{ cursor: 'crosshair', display: 'block' }} />
                    <div ref={tooltipRef} style={{
                        display: 'none',
                        position: 'absolute',
                        background: 'rgba(2, 10, 28, 0.96)',
                        border: '1px solid rgba(0, 245, 212, 0.45)',
                        borderRadius: '3px',
                        padding: '9px 13px',
                        pointerEvents: 'none',
                        zIndex: 20,
                        minWidth: '100px',
                        boxShadow: '0 0 14px rgba(0, 245, 212, 0.2)',
                    }} />
                </div>
            );
        }

        // ── HomePage ──────────────────────────────────────────────────

        function HomePage() {
            const [devices, setDevices]     = useState({});
            const [latest, setLatest]       = useState([]);
            const [chartData, setChartData] = useState({});
            const [forecastResult, setForecastResult] = useState(null);
            const lastTsRef    = useRef(null);
            const rtBucketRef  = useRef(null); // { bucket, sums:{key→n}, counts:{key→n} }

            // Load device list
            useEffect(() => {
                fetch(`${API_BASE}/api/devices`)
                    .then(r => r.json()).then(d => setDevices(d))
                    .catch(e => console.error(e));
            }, []);

            // Fetch forecast every 5 minutes
            useEffect(() => {
                const fetchForecast = () => {
                    fetch(`${API_BASE}/api/peak-forecast?threshold=${THRESHOLD_KW}&hours=4`)
                        .then(r => r.json())
                        .then(d => { if (!d.error) setForecastResult(d); })
                        .catch(() => {});
                };
                fetchForecast();
                const iv = setInterval(fetchForecast, 5 * 60 * 1000);
                return () => clearInterval(iv);
            }, []);

            // Poll latest every 10 s
            useEffect(() => {
                const poll = async () => {
                    try {
                        const r = await fetch(`${API_BASE}/api/latest`);
                        const d = await r.json();
                        setLatest(d.data || []);
                    } catch(e) {}
                };
                poll();
                const iv = setInterval(poll, 10000);
                return () => clearInterval(iv);
            }, []);

            // Load today's history once (when devices ready)
            useEffect(() => {
                if (!devices.groups || Object.keys(devices.groups).length === 0) return;
                const today = getTodayTaiwanDate();

                const loadHistory = async () => {
                    const result = {};

                    // Factory total device history → 5-min average
                    try {
                        const r = await fetch(`${API_BASE}/api/power-history?device=%E5%85%A8%E5%BB%A0%E7%B8%BD%E7%94%A8%E9%9B%BB&days=1&limit=2000`);
                        const d = await r.json();
                        const raw = (d.data || [])
                            .filter(p => getTimestampTaiwanDate(p.timestamp) === today)
                            .reverse()
                            .map(p => ({ timestamp: p.timestamp, label: formatTimeHHMM(p.timestamp), value: p.value }));
                        result.factory = resampleTo5Min(raw);
                    } catch(e) { result.factory = []; }

                    // Each group → 5-min average
                    for (const [groupName, groupDevs] of Object.entries(devices.groups)) {
                        try {
                            const promises = groupDevs.map(dev =>
                                fetch(`${API_BASE}/api/power-history?device=${encodeURIComponent(dev)}&days=1&limit=2000`)
                                    .then(r => r.json()).then(d => d.data || []).catch(() => [])
                            );
                            const allData = await Promise.all(promises);
                            const timeMap = {};
                            allData.forEach(devData => devData.forEach(p => {
                                if (getTimestampTaiwanDate(p.timestamp) !== today) return;
                                if (!timeMap[p.timestamp]) timeMap[p.timestamp] = 0;
                                timeMap[p.timestamp] += p.value;
                            }));
                            const rawGroup = Object.entries(timeMap)
                                .map(([ts, val]) => ({ timestamp: ts, label: formatTimeHHMM(ts), value: val }))
                                .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
                            result[groupName] = resampleTo5Min(rawGroup);
                        } catch(e) { result[groupName] = []; }
                    }

                    // Record latest timestamp seen
                    const allTs = Object.values(result).flat().map(p => p.timestamp).sort();
                    if (allTs.length > 0) lastTsRef.current = allTs[allTs.length - 1];

                    setChartData(result);
                };

                loadHistory();
            }, [devices.groups]);

            // Real-time update: 5-minute rolling average
            // Same bucket  → update the last chart point (running average)
            // New bucket   → append a fresh point
            useEffect(() => {
                if (latest.length === 0 || !devices.groups || Object.keys(chartData).length === 0) return;

                const timestamps = latest.map(r => r.timestamp).filter(Boolean);
                if (timestamps.length === 0) return;
                const newestTs = [...timestamps].sort().pop();

                if (newestTs === lastTsRef.current) return;
                if (getTimestampTaiwanDate(newestTs) !== getTodayTaiwanDate()) return;

                const latestMap   = {};
                latest.forEach(r => { latestMap[r.device_name] = r; });
                const newLabel    = formatTimeHHMM(newestTs);
                const newBucket   = get5MinBucket(timeToMinutes(newLabel));
                const bucketLabel = minutesToHHMM(newBucket);
                const groups      = devices.groups;

                const factoryDevs = groups["全廠"] || [];
                const factoryVal  = factoryDevs.reduce((s, d) => s + (latestMap[d]?.value || 0), 0);
                const totals      = computeGroupTotals(latestMap, groups);

                const rb           = rtBucketRef.current;
                const isSameBucket = rb && rb.bucket === newBucket;

                if (isSameBucket) {
                    // Accumulate into running average, replace last point
                    rb.sums.factory = (rb.sums.factory || 0) + factoryVal;
                    rb.counts.factory = (rb.counts.factory || 0) + 1;
                    for (const gName of Object.keys(groups)) {
                        rb.sums[gName]   = (rb.sums[gName]   || 0) + (totals[gName] || 0);
                        rb.counts[gName] = (rb.counts[gName] || 0) + 1;
                    }
                    setChartData(prev => {
                        const next = {};
                        for (const key of Object.keys(prev)) {
                            const arr = prev[key];
                            if (!arr || arr.length === 0) { next[key] = arr; continue; }
                            if (rb.sums[key] !== undefined && rb.counts[key]) {
                                const updated = [...arr];
                                updated[updated.length - 1] = { ...updated[updated.length - 1], value: rb.sums[key] / rb.counts[key] };
                                next[key] = updated;
                            } else {
                                next[key] = arr;
                            }
                        }
                        return next;
                    });
                } else {
                    // New 5-min bucket: reset accumulator and append
                    const sums   = { factory: factoryVal };
                    const counts = { factory: 1 };
                    for (const gName of Object.keys(groups)) { sums[gName] = totals[gName] || 0; counts[gName] = 1; }
                    rtBucketRef.current = { bucket: newBucket, sums, counts };

                    setChartData(prev => {
                        const next = { ...prev };
                        const prevFactory    = prev.factory || [];
                        const lastFLabel     = prevFactory.length > 0 ? prevFactory[prevFactory.length - 1].label : '';
                        if (bucketLabel !== lastFLabel) {
                            next.factory = [...prevFactory, { timestamp: newestTs, label: bucketLabel, value: factoryVal }];
                        }
                        for (const [gName] of Object.entries(groups)) {
                            const prevGroup   = prev[gName] || [];
                            const lastGLabel  = prevGroup.length > 0 ? prevGroup[prevGroup.length - 1].label : '';
                            if (bucketLabel !== lastGLabel) {
                                next[gName] = [...prevGroup, { timestamp: newestTs, label: bucketLabel, value: totals[gName] || 0 }];
                            }
                        }
                        return next;
                    });
                }

                lastTsRef.current = newestTs;
            }, [latest, devices.groups, chartData]);

            // Current totals from latest
            const latestMap   = {};
            latest.forEach(r => { latestMap[r.device_name] = r; });
            const groupTotals = computeGroupTotals(latestMap, devices.groups);
            const factoryTotal = groupTotals["全廠"] || 0;

            return (
                <div>
                    <div className="factory-total">
                        <div className="corner-tl"></div>
                        <div className="section-label">全廠總用電</div>
                        <div className="factory-total-value">{factoryTotal.toFixed(1)}</div>
                        <div className="unit-label">kW</div>
                        <div className="chart-container">
                            {chartData.factory ? (
                                <LineChart data={chartData.factory} height={258} maxTicks={12} />
                            ) : (
                                <div className="loading">載入圖表資料...</div>
                            )}
                        </div>
                    </div>

                    {/* ── 尖峰預測卡片 ── */}
                    {forecastResult && (
                        <div className="forecast-card">
                            <div className="forecast-header">
                                <div className="forecast-title">🔮 尖峰預測 — 未來 4 小時</div>
                                <div className="forecast-meta">
                                    更新於 {forecastResult.generated_at?.slice(11,16)} ·
                                    修正係數 ×{forecastResult.correction_ratio}
                                </div>
                            </div>

                            {forecastResult.forecast?.some(f => f.over_threshold) && (
                                <div className="forecast-alert">
                                    <div className="forecast-alert-dot"></div>
                                    預測 {forecastResult.forecast.filter(f => f.over_threshold).length * 5} 分鐘
                                    內超過警戒值 {THRESHOLD_KW} kW，建議提前調度高耗電設備至離峰時段
                                </div>
                            )}

                            <ForecastChart
                                historicalData={chartData.factory || []}
                                forecastData={forecastResult.forecast || []}
                                threshold={THRESHOLD_KW}
                                height={280}
                            />

                            <div className="forecast-legend">
                                <div className="legend-item">
                                    <div className="legend-line hist"></div>
                                    <span>今日用電</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-line pred"></div>
                                    <span>預測趨勢</span>
                                </div>
                                <div className="legend-item">
                                    <div className="legend-line thresh"></div>
                                    <span>警戒線 {THRESHOLD_KW} kW</span>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="groups-grid">
                        {Object.entries(devices.groups || {}).map(([group, devs]) => (
                            <div key={group} className="group-card"
                                onClick={() => window.location.hash = `/group/${encodeURIComponent(group)}`}>
                                <div className="group-card-title">{GROUP_ICONS[group]} {group}</div>
                                <div className="device-count">{devs.length} 項設備</div>
                                <div className="group-card-value">{(groupTotals[group] || 0).toFixed(1)}</div>
                                <div className="group-unit">kW</div>
                                <div className="small-chart-container">
                                    {chartData[group] ? (
                                        <LineChart data={chartData[group]} height={140} maxTicks={6} />
                                    ) : (
                                        <div style={{ color:'#3a6080', textAlign:'center', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', letterSpacing:'2px' }}>
                                            LOADING...
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ── GroupDetailPage ───────────────────────────────────────────

        function GroupDetailPage({ groupName }) {
            const decodedGroup = decodeURIComponent(groupName);
            const [devices, setDevices]         = useState({});
            const [latest, setLatest]           = useState([]);
            const [deviceChartData, setDCD]     = useState({});
            const lastTsRef   = useRef(null);
            const rtBucketRef = useRef(null); // { bucket, sums:{[dev]→n}, counts:{[dev]→n} }

            useEffect(() => {
                fetch(`${API_BASE}/api/devices`)
                    .then(r => r.json()).then(d => setDevices(d)).catch(e => console.error(e));
            }, []);

            useEffect(() => {
                const poll = async () => {
                    try {
                        const r = await fetch(`${API_BASE}/api/latest`);
                        const d = await r.json();
                        setLatest(d.data || []);
                    } catch(e) {}
                };
                poll();
                const iv = setInterval(poll, 10000);
                return () => clearInterval(iv);
            }, []);

            // Load today's history for each device in this group
            useEffect(() => {
                if (!devices.groups?.[decodedGroup]) return;
                const today    = getTodayTaiwanDate();
                const groupDevs = devices.groups[decodedGroup];

                const loadHistory = async () => {
                    const history = {};
                    for (const dev of groupDevs) {
                        try {
                            const r = await fetch(`${API_BASE}/api/power-history?device=${encodeURIComponent(dev)}&days=1&limit=2000`);
                            const d = await r.json();
                            const raw = (d.data || [])
                                .filter(p => getTimestampTaiwanDate(p.timestamp) === today)
                                .reverse()
                                .map(p => ({ timestamp: p.timestamp, label: formatTimeHHMM(p.timestamp), value: p.value }));
                            history[dev] = resampleTo5Min(raw);
                        } catch(e) { history[dev] = []; }
                    }

                    const allTs = Object.values(history).flat().map(p => p.timestamp).sort();
                    if (allTs.length > 0) lastTsRef.current = allTs[allTs.length - 1];

                    setDCD(history);
                };

                loadHistory();
            }, [devices.groups, decodedGroup]);

            // Real-time update: 5-minute rolling average per device
            useEffect(() => {
                if (latest.length === 0 || !devices.groups?.[decodedGroup] || Object.keys(deviceChartData).length === 0) return;

                const timestamps = latest.map(r => r.timestamp).filter(Boolean);
                if (timestamps.length === 0) return;
                const newestTs = [...timestamps].sort().pop();

                if (newestTs === lastTsRef.current) return;
                if (getTimestampTaiwanDate(newestTs) !== getTodayTaiwanDate()) return;

                const latestMap   = {};
                latest.forEach(r => { latestMap[r.device_name] = r; });
                const newLabel    = formatTimeHHMM(newestTs);
                const newBucket   = get5MinBucket(timeToMinutes(newLabel));
                const bucketLabel = minutesToHHMM(newBucket);
                const groupDevs   = devices.groups[decodedGroup];

                const rb           = rtBucketRef.current;
                const isSameBucket = rb && rb.bucket === newBucket;

                if (isSameBucket) {
                    for (const dev of groupDevs) {
                        const reading = latestMap[dev];
                        if (!reading) continue;
                        rb.sums[dev]   = (rb.sums[dev]   || 0) + reading.value;
                        rb.counts[dev] = (rb.counts[dev] || 0) + 1;
                    }
                    setDCD(prev => {
                        const next = { ...prev };
                        for (const dev of groupDevs) {
                            const arr = prev[dev] || [];
                            if (arr.length === 0 || rb.sums[dev] === undefined) continue;
                            const updated = [...arr];
                            updated[updated.length - 1] = { ...updated[updated.length - 1], value: rb.sums[dev] / rb.counts[dev] };
                            next[dev] = updated;
                        }
                        return next;
                    });
                } else {
                    const sums = {}, counts = {};
                    for (const dev of groupDevs) {
                        sums[dev]   = latestMap[dev]?.value || 0;
                        counts[dev] = 1;
                    }
                    rtBucketRef.current = { bucket: newBucket, sums, counts };

                    setDCD(prev => {
                        const next = { ...prev };
                        for (const dev of groupDevs) {
                            const reading = latestMap[dev];
                            if (!reading) continue;
                            const prevData  = prev[dev] || [];
                            const lastLabel = prevData.length > 0 ? prevData[prevData.length - 1].label : '';
                            if (bucketLabel !== lastLabel) {
                                next[dev] = [...prevData, { timestamp: newestTs, label: bucketLabel, value: reading.value }];
                            }
                        }
                        return next;
                    });
                }

                lastTsRef.current = newestTs;
            }, [latest, devices.groups, decodedGroup, deviceChartData]);

            const latestMap = {};
            latest.forEach(r => { latestMap[r.device_name] = r; });
            const groupDevs  = devices.groups?.[decodedGroup] || [];
            const groupTotal = groupDevs.reduce((sum, d) => sum + (latestMap[d]?.value || 0), 0);

            // Aggregate per-device 5-min buckets by label (bucket start HH:MM)
            const groupData = useMemo(() => {
                if (Object.keys(deviceChartData).length === 0) return [];
                const labelMap = {};
                Object.values(deviceChartData).forEach(data => {
                    data.forEach(d => {
                        if (!labelMap[d.label]) labelMap[d.label] = { value: 0, timestamp: d.timestamp || '' };
                        labelMap[d.label].value += d.value;
                    });
                });
                return Object.entries(labelMap)
                    .map(([label, { value, timestamp }]) => ({ timestamp, label, value }))
                    .sort((a, b) => a.label.localeCompare(b.label));
            }, [deviceChartData]);

            return (
                <div>
                    <button className="back-button" onClick={() => window.location.hash = '/'}>← 返回首頁</button>

                    <div className="factory-total">
                        <div className="corner-tl"></div>
                        <div className="section-label">{GROUP_ICONS[decodedGroup]} {decodedGroup} — 分組總用電</div>
                        <div className="factory-total-value">{groupTotal.toFixed(1)}</div>
                        <div className="unit-label">kW</div>
                        <div className="chart-container">
                            {groupData.length >= 0 ? (
                                <LineChart data={groupData} height={258} maxTicks={12} />
                            ) : (
                                <div className="loading">載入圖表資料...</div>
                            )}
                        </div>
                    </div>

                    <div className="devices-list">
                        {groupDevs.map(dev => {
                            const reading    = latestMap[dev];
                            const history    = deviceChartData[dev] || [];
                            const cumulative = calcCumulative(history);

                            return (
                                <div key={dev} className="device-card">
                                    <div className="device-name">{dev}</div>
                                    <div className="device-metrics">
                                        <div className="metric">
                                            <div className="metric-label">即時用電</div>
                                            <div className="metric-value">{reading ? reading.value.toFixed(1) : '—'}</div>
                                            <div className="metric-unit">kW</div>
                                        </div>
                                        <div className="metric">
                                            <div className="metric-label">今日累計</div>
                                            <div className="metric-value">{cumulative.toFixed(1)}</div>
                                            <div className="metric-unit">kWh</div>
                                        </div>
                                    </div>
                                    <div className="device-chart">
                                        {history.length >= 0 ? (
                                            <LineChart data={history} height={190} maxTicks={8} />
                                        ) : (
                                            <div className="loading" style={{ height:'100%' }}>LOADING...</div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── App (root) ────────────────────────────────────────────────

        function App() {
            const [page, setPage]           = useState('/');
            const [groupName, setGroupName] = useState(null);
            const [, forceUpdate]           = useState(0);

            useEffect(() => {
                const handleHash = () => {
                    const hash = window.location.hash.slice(1) || '/';
                    if (hash.startsWith('/group/')) {
                        setPage('/group');
                        setGroupName(hash.replace('/group/', ''));
                    } else {
                        setPage('/');
                    }
                };
                handleHash();
                window.addEventListener('hashchange', handleHash);
                return () => window.removeEventListener('hashchange', handleHash);
            }, []);

            // Clock ticks every second
            useEffect(() => {
                const iv = setInterval(() => forceUpdate(p => p + 1), 1000);
                return () => clearInterval(iv);
            }, []);

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="header-title" onClick={() => window.location.hash = '/'}>⚡ 電力監控儀表板</div>
                        <div className="header-right">
                            <div className="status-dot"></div>
                            <span>ONLINE · {getTaiwanTimeString()}</span>
                        </div>
                    </header>
                    <div className="content">
                        {page === '/' ? <HomePage /> : <GroupDetailPage groupName={groupName} />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
